title: acorn
description: LLM agent framework with structured I/O
url: https://askmanu.github.io
baseurl: /acorn

remote_theme: just-the-docs/just-the-docs
color_scheme: acorn

# Just the Docs config
search_enabled: true
heading_anchors: true
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme
